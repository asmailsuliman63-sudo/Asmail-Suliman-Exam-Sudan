<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امتحانات السودان</title>

<style>
body{
font-family: Arial;
direction: rtl;
background:#f4f4f4;
text-align:center;
padding:20px;
}

h1{
color:#00695c;
}

input{
width:90%;
padding:10px;
margin:10px 0;
font-size:16px;
}

.file{
background:white;
margin:10px auto;
padding:12px;
border-radius:8px;
box-shadow:0 0 5px #ccc;
width:90%;
text-align:right;
}

a{
text-decoration:none;
color:#1565c0;
font-size:16px;
}
</style>
</head>

<body>

<h1>📚 مكتبة امتحانات السودان 2003 - 2024</h1>

<input type="text" id="search" onkeyup="filterFiles()" placeholder="ابحث عن مادة أو سنة...">

<div id="list">

<!-- الملفات ستظهر هنا -->

</div>

<script>
// قائمة الملفات (GitHub سيستبدلها أو يمكنك تحديثها لاحقًا)
const files = [
"arabic-2005.pdf",
"arabic-2006.pdf",
"english-2005.pdf",
"physics-2010.pdf",
"chemistry-2015.pdf",
"biology-2018.pdf",
"math-basic-2012.pdf",
"math-advance-2020.pdf"
];

const list = document.getElementById("list");

function loadFiles(){
list.innerHTML = "";
files.forEach(f => {
let div = document.createElement("div");
div.className = "file";
div.innerHTML = `<a href="${f}" target="_blank">📄 ${f}</a>`;
list.appendChild(div);
});
}

function filterFiles(){
let value = document.getElementById("search").value.toLowerCase();
let items = document.getElementsByClassName("file");

for(let i=0;i<items.length;i++){
let text = items[i].innerText.toLowerCase();
items[i].style.display = text.includes(value) ? "block" : "none";
}
}

loadFiles();
</script>

</body>
</html>
